AWSTemplateFormatVersion: "2010-09-09"
Description: AWS App Runner backend for Gaming Shop.

Parameters:
  ProjectName:
    Type: String
    Default: gaming-shop
  VpcId:
    Type: AWS::EC2::VPC::Id
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  BackendSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  DatabaseUrlSecretArn:
    Type: String
  BackendImage:
    Type: String
    Description: Backend image URI in ECR.
  SecretKey:
    Type: String
    NoEcho: true
    Default: change-me
  ContainerPort:
    Type: Number
    Default: 8000

Resources:
  AppRunnerEcrAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-apprunner-ecr-access-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: build.apprunner.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess

  AppRunnerInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-apprunner-instance-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: tasks.apprunner.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ReadRuntimeSecrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref DatabaseUrlSecretArn

  AppRunnerVpcConnector:
    Type: AWS::AppRunner::VpcConnector
    Properties:
      VpcConnectorName: !Sub "${ProjectName}-backend-vpc-connector"
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref BackendSecurityGroupId

  BackendService:
    Type: AWS::AppRunner::Service
    Properties:
      ServiceName: !Sub "${ProjectName}-backend"
      SourceConfiguration:
        AuthenticationConfiguration:
          AccessRoleArn: !GetAtt AppRunnerEcrAccessRole.Arn
        AutoDeploymentsEnabled: false
        ImageRepository:
          ImageIdentifier: !Ref BackendImage
          ImageRepositoryType: ECR
          ImageConfiguration:
            Port: !Ref ContainerPort
            RuntimeEnvironmentVariables:
              - Name: SECRET_KEY
                Value: !Ref SecretKey
              - Name: ALGORITHM
                Value: HS256
              - Name: ACCESS_TOKEN_EXPIRE_MINUTES
                Value: "30"
            RuntimeEnvironmentSecrets:
              - Name: DATABASE_URL
                Value: !Ref DatabaseUrlSecretArn
      InstanceConfiguration:
        Cpu: 0.5 vCPU
        Memory: 1 GB
        InstanceRoleArn: !GetAtt AppRunnerInstanceRole.Arn
      NetworkConfiguration:
        EgressConfiguration:
          EgressType: VPC
          VpcConnectorArn: !GetAtt AppRunnerVpcConnector.VpcConnectorArn
      HealthCheckConfiguration:
        Protocol: HTTP
        Path: /health
        Interval: 10
        Timeout: 5
        HealthyThreshold: 1
        UnhealthyThreshold: 5

Outputs:
  BackendUrl:
    Value: !Sub "https://${BackendService.ServiceUrl}"
  AppRunnerServiceArn:
    Value: !GetAtt BackendService.ServiceArn
  AppRunnerServiceId:
    Value: !GetAtt BackendService.ServiceId
