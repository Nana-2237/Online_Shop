AWSTemplateFormatVersion: "2010-09-09"
Description: PostgreSQL database for Gaming Shop.

Parameters:
  ProjectName:
    Type: String
    Default: gaming-shop
  VpcId:
    Type: AWS::EC2::VPC::Id
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  DatabaseSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  DBName:
    Type: String
    Default: gaming_shop
  DBUsername:
    Type: String
    Default: postgres
  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
  DBInstanceClass:
    Type: String
    Default: db.t3.micro
  DBEngineVersion:
    Type: String
    Default: "18.3"
  DBAllocatedStorage:
    Type: Number
    Default: 20

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub "${ProjectName} database subnet group"
      SubnetIds: !Ref PrivateSubnetIds
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-db-subnet-group"

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub "${ProjectName}-db"
      Engine: postgres
      EngineVersion: !Ref DBEngineVersion
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: !Ref DBAllocatedStorage
      StorageType: gp3
      DBName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref DatabaseSecurityGroupId
      PubliclyAccessible: false
      BackupRetentionPeriod: 0
      MultiAZ: false
      DeletionProtection: false

  DatabaseUrlSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${ProjectName}/database-url"
      Description: Backend SQLAlchemy DATABASE_URL.
      SecretString: !Sub "postgresql+psycopg2://${DBUsername}:${DBPassword}@${Database.Endpoint.Address}:5432/${DBName}"

Outputs:
  DatabaseEndpoint:
    Value: !GetAtt Database.Endpoint.Address
  DatabaseUrlSecretArn:
    Value: !Ref DatabaseUrlSecret
