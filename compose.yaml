services:
  db:
    image: postgres:16
    container_name: gaming-shop-db
    restart: unless-stopped

    env_file:
      - ./backend/.env

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:4.3.1
    container_name: gaming-shop-kafka
    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: >-
        PLAINTEXT://:29092,
        CONTROLLER://:29093,
        PLAINTEXT_HOST://:9092

      KAFKA_ADVERTISED_LISTENERS: >-
        PLAINTEXT://kafka:29092,
        PLAINTEXT_HOST://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >-
        CONTROLLER:PLAINTEXT,
        PLAINTEXT:PLAINTEXT,
        PLAINTEXT_HOST:PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"
        ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: gaming-shop-kafka-ui
    restart: unless-stopped

    depends_on:
      kafka:
        condition: service_healthy

    ports:
      - "8085:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: gaming-shop-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: gaming-shop-backend
    restart: unless-stopped

    env_file:
      - ./backend/.env

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  kafka-consumer:
    build:
      context: ./kafka-consumer
      dockerfile: Dockerfile

    container_name: gaming-shop-kafka-consumer
    restart: unless-stopped

    env_file:
      - ./backend/.env

    volumes:
      - ${USERPROFILE}/.aws:/root/.aws:ro

    depends_on:
      kafka:
        condition: service_healthy

volumes:
  postgres_data: